{% extends "blog/base.html" %}
{% block title %}Login — {% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to your Foodies account</p>

    <form method="POST" action="{% url 'login' %}">
      {% csrf_token %}
      <div class="form-group">
        <label for="id_username">Username</label>
        <input type="text" id="id_username" class="form-control" name="username" placeholder="your_username" autocomplete="username">
      </div>
      <div class="form-group">
        <label for="id_password">Password</label>
        <input type="password" id="id_password" class="form-control" name="password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px;">
        Sign In
      </button>
    </form>

    <div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--border);font-size:13px;color:var(--muted);">
      <a href="{% url 'password_reset' %}">Forgot password?</a>
      &nbsp;·&nbsp;
      New here? <a href="{% url 'register' %}">Create an account</a>
    </div>
  </div>
</div>
{% endblock content %}
